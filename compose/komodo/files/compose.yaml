---
services:
  << service_name >>:
    image: ghcr.io/moghtech/komodo-core:2.1.2
    restart: << restart_policy >>
    container_name: << container_name >>
    hostname: << container_hostname >>
    <%- if not database_external %>
    depends_on:
      <%- if database_type == 'mongo' %>
      - << service_name >>-mongo
      <%- elif database_type == 'ferretdb' %>
      - << service_name >>-ferretdb
      <%- endif %>
    <%- endif %>
    <%- if network_mode == 'host' %>
    network_mode: host
    <%- else %>
    networks:
      <%- if traefik_enabled %>
      << traefik_network >>:
      <%- endif %>
      <%- if network_mode == 'macvlan' %>
      << network_name >>:
        ipv4_address: << network_macvlan_ipv4_address >>
      <%- elif network_mode == 'bridge' %>
      << network_name >>:
      <%- endif %>
    <%- endif %>
    <%- if network_mode == 'bridge' and not traefik_enabled %>
    ports:
      - "<< ports_http >>:9120/tcp"
    <%- endif %>
    environment:
      <%- if database_external %>
      KOMODO_DATABASE_ADDRESS: "<< database_address >>"
      <%- elif database_type == 'mongo' %>
      <%- if network_mode == 'host' %>
      KOMODO_DATABASE_ADDRESS: "localhost:27017"
      <%- else %>
      KOMODO_DATABASE_ADDRESS: "<< service_name >>-mongo:27017"
      <%- endif %>
      <%- elif database_type == 'ferretdb' %>
      <%- if network_mode == 'host' %>
      KOMODO_DATABASE_ADDRESS: "localhost:27017"
      <%- else %>
      KOMODO_DATABASE_ADDRESS: "<< service_name >>-ferretdb:27017"
      <%- endif %>
      <%- endif %>
      KOMODO_DATABASE_DB_NAME: "<< database_name >>"
      KOMODO_DATABASE_USERNAME: "${KOMODO_DATABASE_USERNAME}"
      KOMODO_DATABASE_PASSWORD: "${KOMODO_DATABASE_PASSWORD}"
      <%- if environment_enabled and environment_jwt_secret %>
      KOMODO_JWT_SECRET: "${KOMODO_JWT_SECRET}"
      <%- endif %>
      <%- if environment_enabled %>
      LOG_LEVEL: "<< environment_log_level >>"
      <%- endif %>
    volumes:
      <%- if volume_mode == 'mount' %>
      - << volume_mount_path >>/data:/app/data:rw
      - << volume_mount_path >>/repos:/app/repos:rw
      <%- elif volume_mode == 'local' or volume_mode == 'nfs' %>
      - << service_name >>-data:/app/data
      - << service_name >>-repos:/app/repos
      <%- endif %>
    <%- if resources_enabled %>
    deploy:
      resources:
        limits:
          cpus: '<< resources_cpu_limit >>'
          memory: << resources_memory_limit >>
    <%- endif %>
    <%- if traefik_enabled %>
    labels:
      - traefik.enable=true
      - traefik.docker.network=<< traefik_network >>
      - traefik.http.services.<< service_name >>-web.loadBalancer.server.port=9120
      - traefik.http.routers.<< service_name >>-http.service=<< service_name >>-web
      - traefik.http.routers.<< service_name >>-http.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< service_name >>-http.entrypoints=<< traefik_entrypoint >>
      <%- if traefik_tls_enabled %>
      - traefik.http.routers.<< service_name >>-https.service=<< service_name >>-web
      - traefik.http.routers.<< service_name >>-https.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< service_name >>-https.entrypoints=<< traefik_tls_entrypoint >>
      - traefik.http.routers.<< service_name >>-https.tls=true
      - traefik.http.routers.<< service_name >>-https.tls.certresolver=<< traefik_tls_certresolver >>
      <%- endif %>
    <%- endif %>

  <%- if not database_external and database_type == 'mongo' %>
  << service_name >>-mongo:
    image: docker.io/library/mongo:8
    restart: << restart_policy >>
    command: --quiet --wiredTigerCacheSizeGB 0.25
    labels:
      komodo.skip:
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${KOMODO_DATABASE_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${KOMODO_DATABASE_PASSWORD}"
    <%- if network_mode == 'host' %>
    network_mode: host
    <%- else %>
    networks:
      << network_name >>:
    <%- endif %>
    volumes:
      - << service_name >>-mongo-data:/data/db
      - << service_name >>-mongo-config:/data/configdb
  <%- elif not database_external and database_type == 'ferretdb' %>
  << service_name >>-postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:17
    restart: << restart_policy >>
    labels:
      komodo.skip:
    environment:
      POSTGRES_USER: "${KOMODO_DATABASE_USERNAME}"
      POSTGRES_PASSWORD: "${KOMODO_DATABASE_PASSWORD}"
      POSTGRES_DB: postgres
    <%- if network_mode == 'host' %>
    network_mode: host
    <%- else %>
    networks:
      << network_name >>:
    <%- endif %>
    volumes:
      - << service_name >>-postgres-data:/var/lib/postgresql/data

  << service_name >>-ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2
    restart: << restart_policy >>
    labels:
      komodo.skip:
    depends_on:
      - << service_name >>-postgres
    environment:
      <%- if network_mode == 'host' %>
      FERRETDB_POSTGRESQL_URL: "postgres://${KOMODO_DATABASE_USERNAME}:${KOMODO_DATABASE_PASSWORD}@localhost:5432/postgres"
      <%- else %>
      FERRETDB_POSTGRESQL_URL: "postgres://${KOMODO_DATABASE_USERNAME}:${KOMODO_DATABASE_PASSWORD}@<< service_name >>-postgres:5432/postgres"
      <%- endif %>
    <%- if network_mode == 'host' %>
    network_mode: host
    <%- else %>
    networks:
      << network_name >>:
    <%- endif %>
    volumes:
      - << service_name >>-ferretdb-state:/state
  <%- endif %>

<%- if volume_mode == 'local' or volume_mode == 'nfs' or not database_external %>
volumes:
  <%- if volume_mode == 'local' %>
  << service_name >>-data:
    driver: local
  << service_name >>-repos:
    driver: local
  <%- elif volume_mode == 'nfs' %>
  << service_name >>-data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=<< volume_nfs_server >>,<< volume_nfs_options >>
      device: ":<< volume_nfs_path >>/data"
  << service_name >>-repos:
    driver: local
    driver_opts:
      type: nfs
      o: addr=<< volume_nfs_server >>,<< volume_nfs_options >>
      device: ":<< volume_nfs_path >>/repos"
  <%- endif %>
  <%- if not database_external and database_type == 'mongo' %>
  << service_name >>-mongo-data:
    driver: local
  << service_name >>-mongo-config:
    driver: local
  <%- elif not database_external and database_type == 'ferretdb' %>
  << service_name >>-postgres-data:
    driver: local
  << service_name >>-ferretdb-state:
    driver: local
  <%- endif %>
<%- endif %>

<%- if network_mode != 'host' %>
networks:
  << network_name >>:
    <%- if network_external %>
    external: true
    <%- else %>
    <%- if network_mode == 'macvlan' %>
    driver: macvlan
    driver_opts:
      parent: << network_macvlan_parent_interface >>
    ipam:
      config:
        - subnet: << network_macvlan_subnet >>
          gateway: << network_macvlan_gateway >>
    name: << network_name >>
    <%- else %>
    driver: bridge
    <%- endif %>
    <%- endif %>
  <%- if traefik_enabled %>
  << traefik_network >>:
    external: true
  <%- endif %>
<%- endif %>
